name: Python CI

# Trigger: Kapan CI ini harus berjalan?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode dari repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Menyiapkan environment Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Menginstal library utama + library testing
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # -------------------------------------------------------
    # CONTINUOUS TESTING
    # Menjalankan seluruh unit test menggunakan pytest.
    # Jika ada test yang gagal, step ini akan mengembalikan
    # exit code != 0 sehingga pipeline otomatis ditandai FAIL.
    # -------------------------------------------------------
    - name: Run unit tests (Continuous Testing)
      run: |
        pytest test_parkapp.py -v --tb=short

    # 5. Menghasilkan laporan code coverage
    # Menunjukkan persentase kode yang tercakup oleh test.
    # Flag --cov-fail-under=80 memastikan pipeline GAGAL
    # jika coverage di bawah 80%.
    - name: Generate coverage report
      run: |
        pytest test_parkapp.py --cov=ParkApp --cov-report=term-missing --cov-fail-under=80
